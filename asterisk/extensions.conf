[general]
static=yes
writeprotect=no
autofallthrough=yes

[default]
exten => _X.,1,NoOp(Unmatched call - hanging up)
 same => n,Hangup()

[incoming]
exten => _X.,1,NoOp(Incoming call from ${CALLERID(all)} to ${EXTEN})
 same => n,Set(CHANNEL(language)=en)
 same => n,Progress()
 same => n,Answer()
 same => n,Wait(0.5)
 same => n,AGI(ai_receptionist.py,${CALLERID(num)},${CALLERID(name)},${EXTEN})
 same => n,Hangup()

exten => s,1,NoOp(Incoming call from ${CALLERID(all)} to s)
 same => n,Set(CHANNEL(language)=en)
 same => n,Progress()
 same => n,Answer()
 same => n,Wait(0.5)
 same => n,AGI(ai_receptionist.py,${CALLERID(num)},${CALLERID(name)},${EXTEN})
 same => n,Hangup()
